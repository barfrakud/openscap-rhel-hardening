---
# remediation.yml
# Quick-wins hardening playbook — safe, universal CIS L1 rules.
# These tasks complement the auto-generated remediation from OpenSCAP.
#
# Usage:
#   ansible-playbook -i inventory.ini remediation.yml
#   ansible-playbook -i inventory.ini remediation.yml --check  # dry-run

- name: OpenSCAP CIS L1 — Quick-Wins Hardening
  hosts: lab
  become: true

  tasks:
    # --- SSH Hardening ---
    - name: SSH — Disable root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart sshd

    - name: SSH — Set MaxAuthTries to 4
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 4'
      notify: Restart sshd

    - name: SSH — Disable empty passwords
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'
      notify: Restart sshd

    - name: SSH — Set ClientAliveInterval
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 300'
      notify: Restart sshd

    - name: SSH — Set ClientAliveCountMax
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveCountMax'
        line: 'ClientAliveCountMax 3'
      notify: Restart sshd

    # --- Kernel / Sysctl ---
    - name: Sysctl — Enable ASLR
      ansible.posix.sysctl:
        name: kernel.randomize_va_space
        value: '2'
        sysctl_set: true
        state: present
        reload: true

    - name: Sysctl — Disable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '0'
        sysctl_set: true
        state: present
        reload: true

    - name: Sysctl — Enable SYN cookies
      ansible.posix.sysctl:
        name: net.ipv4.tcp_syncookies
        value: '1'
        sysctl_set: true
        state: present
        reload: true

    - name: Sysctl — Disable ICMP redirects
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: '0'
        sysctl_set: true
        state: present
        reload: true
      loop:
        - net.ipv4.conf.all.accept_redirects
        - net.ipv4.conf.default.accept_redirects
        - net.ipv4.conf.all.send_redirects
        - net.ipv4.conf.default.send_redirects

    # --- Services ---
    - name: Disable unnecessary services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - avahi-daemon
        - cups
      failed_when: false

    # --- Filesystem Permissions ---
    - name: Set permissions on /etc/passwd
      ansible.builtin.file:
        path: /etc/passwd
        owner: root
        group: root
        mode: '0644'

    - name: Set permissions on /etc/shadow
      ansible.builtin.file:
        path: /etc/shadow
        owner: root
        group: root
        mode: '0000'

    - name: Set permissions on /etc/group
      ansible.builtin.file:
        path: /etc/group
        owner: root
        group: root
        mode: '0644'

    - name: Set permissions on /etc/gshadow
      ansible.builtin.file:
        path: /etc/gshadow
        owner: root
        group: root
        mode: '0000'

    # --- Logging ---
    - name: Ensure auditd is enabled
      ansible.builtin.systemd:
        name: auditd
        state: started
        enabled: true

    - name: Ensure rsyslog is enabled
      ansible.builtin.systemd:
        name: rsyslog
        state: started
        enabled: true

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
